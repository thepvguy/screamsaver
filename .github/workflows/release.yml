name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-msi:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # MinVer needs full history to resolve version from tags

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install WiX
        run: dotnet tool install --global wix

      - name: Build MSI
        run: |
          $version = '${{ github.ref_name }}' -replace '^v', ''
          powershell -ExecutionPolicy Bypass -File Screamsaver.Installer/Build.ps1 -Version $version
        shell: pwsh

      - name: Create GitHub Release
        run: |
          gh release create ${{ github.ref_name }} `
            --title "Screamsaver ${{ github.ref_name }}" `
            --generate-notes `
            Screamsaver.Installer/Screamsaver.msi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
